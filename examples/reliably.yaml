services:
- name: website
  service-levels:
  - name: 95th of requests response time under 100ms
    type: latency
    criteria:
      threshold: 100ms
    slo: 95
    sli:
    - id: myprojectid/google-cloud-load-balancers/myloadbalancer-name
      provider: gcp
    window: PT24H
  - name: 99th of requests response time under 500ms
    type: latency
    criteria:
      threshold: 500ms
    slo: 99
    sli:
    - id: myprojectid/google-cloud-load-balancers/myloadbalancer-name
      provider: gcp
    window: PT24H
  - name: 99th of requests responses not 5xx
    type: availability
    slo: 99
    sli:
    - id: myprojectid/google-cloud-load-balancers/myloadbalancer-name
      provider: gcp
    window: P7D
