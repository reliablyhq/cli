version: 0.1
app:
  name: reliablyhq/cli
  owner: mick@reliablyhq.io
  repo: github.com/reliablyhq/cli
ci:
  type: github actions
service_level:
  availability: 50
  latency: 100ms
  error_budget_pc: 50
dependencies:
- name: mick-roper/awesome-service
- name: some other service
infrastructure_as_code:
  type: terraform
  root: terraform/
services:
  - name: Service A
    availability: 99
    latency: 500ms
    error_budget_percentage: 1
    default_platform: aws
    resources:
    - id: arn:123456:some-region:lambda:function-1:version-1
    - id: arn:123456:some-region:lambda:function-2:version-1
    - id: arn:123456:some-region:lambda:function-2:version-2
    - id: cdn-provider.customer.distribution-id
      provider: maxcdn
  - name: Service B
    availability: 99.9
    latency: 250ms
    error_budget_percentage: 1
    default_platform: aws
    resources:
    - id: arn:123456:some-region:lambda:function-1:version-1
    - id: arn:123456:some-region:lambda:function-2:version-1
    - id: arn:123456:some-region:lambda:function-2:version-2
    - id: cdn-provider.customer.distribution-id
      provider: maxcdn
